<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Der Raum – Zwischen Reiz und Reaktion</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f5f2ec;
      --surface: #edeae2;
      --surface2: #e8e4da;
      --border: rgba(110, 140, 110, 0.25);
      --accent: #6e8c6e;
      --accent-dark: #4f6b4f;
      --accent-soft: rgba(110, 140, 110, 0.1);
      --text: #2e3028;
      --text-muted: #7a8070;
      --user-bubble: #dde8dd;
      --bot-bubble: #ffffff;
      --radius: 18px;
      --shadow: 0 2px 12px rgba(80,100,80,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Jost', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* subtle texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%236e8c6e' fill-opacity='0.03'%3E%3Ccircle cx='20' cy='20' r='1'/%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 760px;
      padding: 36px 24px 20px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    .logo-eyebrow {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }

    header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(26px, 5vw, 40px);
      color: var(--text);
      letter-spacing: 0.3px;
    }

    header h1 em {
      font-style: italic;
      color: var(--accent-dark);
    }

    header p {
      margin-top: 8px;
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 300;
    }

    .leaf {
      display: inline-block;
      margin-top: 12px;
      font-size: 22px;
      opacity: 0.6;
    }

    .chat-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 760px;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0 16px;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0 8px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 300px;
      max-height: calc(100vh - 360px);
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 85%;
      animation: fadeUp 0.3s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.bot  { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 13px 17px;
      border-radius: var(--radius);
      font-size: 15px;
      line-height: 1.7;
      font-weight: 300;
      white-space: pre-wrap;
      box-shadow: var(--shadow);
    }

    .msg.user .bubble {
      background: var(--user-bubble);
      border: 1px solid rgba(110, 140, 110, 0.3);
      border-bottom-right-radius: 5px;
      color: #2a3828;
    }

    .msg.bot .bubble {
      background: var(--bot-bubble);
      border: 1px solid rgba(110, 140, 110, 0.15);
      border-bottom-left-radius: 5px;
    }

    .sender {
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 5px;
      padding: 0 4px;
    }

    .typing span {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      margin: 0 2px;
      animation: blink 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.25; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    .suggestions {
      padding: 10px 0 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .suggestion-btn {
      background: white;
      border: 1px solid var(--border);
      color: var(--accent-dark);
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      font-weight: 400;
      padding: 8px 15px;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: var(--shadow);
    }

    .suggestion-btn:hover {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent-dark);
    }

    .input-area {
      padding: 12px 0 24px;
      border-top: 1px solid var(--border);
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #userInput {
      flex: 1;
      background: white;
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-size: 15px;
      font-weight: 300;
      padding: 13px 17px;
      resize: none;
      min-height: 50px;
      max-height: 140px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      line-height: 1.5;
      box-shadow: var(--shadow);
    }

    #userInput::placeholder { color: #aab0a0; }

    #userInput:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(110,140,110,0.12);
    }

    #sendBtn {
      background: var(--accent);
      border: none;
      border-radius: 14px;
      width: 50px;
      height: 50px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 2px 8px rgba(110,140,110,0.3);
    }

    #sendBtn:hover { background: var(--accent-dark); transform: translateY(-1px); }
    #sendBtn:active { transform: translateY(0); }
    #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    #sendBtn svg { width: 20px; height: 20px; fill: white; }

    .hint {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      margin-top: 10px;
      letter-spacing: 0.3px;
    }

    .error-banner {
      background: #fdf0f0;
      border: 1px solid #f0c0c0;
      color: #c05050;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 13px;
      margin-top: 8px;
    }

    @media (max-width: 480px) {
      header { padding: 24px 16px 16px; }
      .chat-wrapper { padding: 0 12px; }
      .msg { max-width: 92%; }
      .bubble { font-size: 14px; padding: 11px 14px; }
      #sendBtn { width: 46px; height: 46px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-eyebrow">Buchreihe</div>
  <h1>Der Raum – <em>zwischen Reiz und Reaktion</em></h1>
  <p>Dein persönlicher Begleiter durch die Bücher</p>
  <div class="leaf">🌿</div>
</header>

<div class="chat-wrapper">
  <div id="chat"></div>

  <div class="suggestions" id="suggestions">
    <button class="suggestion-btn" onclick="sendSuggestion(this)">Was ist „der Raum"?</button>
    <button class="suggestion-btn" onclick="sendSuggestion(this)">Wie kann ich bewusster reagieren?</button>
    <button class="suggestion-btn" onclick="sendSuggestion(this)">Was bedeutet: Leiden ist eine Wahl?</button>
    <button class="suggestion-btn" onclick="sendSuggestion(this)">Wie finde ich innere Stille?</button>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="userInput" placeholder="Schreib deine Frage …" rows="1"></textarea>
      <button id="sendBtn" onclick="sendMessage()" aria-label="Senden">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <div class="hint">Basierend auf den Büchern „Du entscheidest", „Schmerz endet" und „Stille"</div>
  </div>
</div>

<script>
const messages=[];
const chatEl=document.getElementById("chat");
const inputEl=document.getElementById("userInput");
const sendBtn=document.getElementById("sendBtn");

inputEl.addEventListener("input",()=>{
  inputEl.style.height="auto";
  inputEl.style.height=Math.min(inputEl.scrollHeight,140)+"px";
});

inputEl.addEventListener("keydown",(e)=>{
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();}
});

function addMessage(role,text){
  const wrap=document.createElement("div");
  wrap.className=`msg ${role}`;
  const sender=document.createElement("div");
  sender.className="sender";
  sender.textContent=role==="user"?"Du":"Der Raum";
  const bubble=document.createElement("div");
  bubble.className="bubble";
  bubble.textContent=text;
  wrap.appendChild(sender);
  wrap.appendChild(bubble);
  chatEl.appendChild(wrap);
  chatEl.scrollTop=chatEl.scrollHeight;
}

function addTyping(){
  const wrap=document.createElement("div");
  wrap.className="msg bot";
  wrap.id="typing-indicator";
  const sender=document.createElement("div");
  sender.className="sender";
  sender.textContent="Der Raum";
  const bubble=document.createElement("div");
  bubble.className="bubble typing";
  bubble.innerHTML="<span></span><span></span><span></span>";
  wrap.appendChild(sender);
  wrap.appendChild(bubble);
  chatEl.appendChild(wrap);
  chatEl.scrollTop=chatEl.scrollHeight;
}

function removeTyping(){
  const t=document.getElementById("typing-indicator");
  if(t)t.remove();
}

function showError(msg){
  const el=document.createElement("div");
  el.className="error-banner";
  el.textContent=msg;
  chatEl.appendChild(el);
  chatEl.scrollTop=chatEl.scrollHeight;
}

function sendSuggestion(btn){
  inputEl.value=btn.textContent;
  document.getElementById("suggestions").style.display="none";
  sendMessage();
}

async function sendMessage(){
  const text=inputEl.value.trim();
  if(!text)return;
  inputEl.value="";
  inputEl.style.height="auto";
  sendBtn.disabled=true;
  document.getElementById("suggestions").style.display="none";
  addMessage("user",text);
  messages.push({role:"user",content:text});
  addTyping();
  try{
    const response=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({messages})
    });
    const data=await response.json();
    removeTyping();
    if(!response.ok){
      showError("Fehler: "+(data.error||response.status));
      messages.pop();
    }else{
      const reply=data.reply||"Keine Antwort erhalten.";
      messages.push({role:"assistant",content:reply});
      addMessage("bot",reply);
    }
  }catch(err){
    removeTyping();
    showError("Verbindungsfehler: "+err.message);
    messages.pop();
  }
  sendBtn.disabled=false;
  inputEl.focus();
}

window.addEventListener("load",()=>{
  setTimeout(()=>{
    addMessage("bot","Willkommen im Raum. 🌿\n\nIch begleite dich durch die B\u00fccher \u201eDu entscheidest\u201c, \u201eSchmerz endet, Leiden ist eine Wahl\u201c und \u201eStille\u201c. Was bewegt dich gerade?");
  },300);
});
</script>
</body>
</html>
