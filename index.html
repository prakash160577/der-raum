<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Der Raum – Zwischen Reiz und Reaktion</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0e0b14;
      --surface: #16121f;
      --surface2: #1e1828;
      --border: rgba(160, 120, 220, 0.15);
      --accent: #a47fd0;
      --accent-soft: rgba(164, 127, 208, 0.12);
      --text: #e8e0f0;
      --text-muted: #8a7fa0;
      --user-bubble: #2a1f40;
      --bot-bubble: #1a1528;
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Jost', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      max-width: 760px;
      padding: 28px 20px 16px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    .logo-eyebrow {
      font-family: 'Jost', sans-serif;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }

    header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(24px, 5vw, 38px);
      color: var(--text);
      letter-spacing: 0.5px;
    }

    header h1 em {
      font-style: italic;
      color: var(--accent);
    }

    header p {
      margin-top: 8px;
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 300;
    }

    .chat-wrapper {
      width: 100%;
      max-width: 760px;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0 12px;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 300px;
      max-height: calc(100vh - 340px);
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 88%;
      animation: fadeUp 0.3s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.bot  { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 15px;
      line-height: 1.65;
      font-weight: 300;
      white-space: pre-wrap;
    }

    .msg.user .bubble {
      background: var(--user-bubble);
      border: 1px solid rgba(164, 127, 208, 0.25);
      border-bottom-right-radius: 4px;
    }

    .msg.bot .bubble {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .sender {
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 5px;
      padding: 0 4px;
    }

    .typing span {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      margin: 0 2px;
      animation: blink 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    .suggestions {
      padding: 8px 0 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .suggestion-btn {
      background: var(--accent-soft);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      font-weight: 300;
      padding: 8px 14px;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
    }

    .suggestion-btn:hover {
      background: rgba(164, 127, 208, 0.22);
      border-color: var(--accent);
    }

    .input-area {
      padding: 12px 0 20px;
      border-top: 1px solid var(--border);
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #userInput {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-size: 15px;
      font-weight: 300;
      padding: 12px 16px;
      resize: none;
      min-height: 48px;
      max-height: 140px;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.5;
    }

    #userInput::placeholder { color: var(--text-muted); }
    #userInput:focus { border-color: var(--accent); }

    #sendBtn {
      background: var(--accent);
      border: none;
      border-radius: 12px;
      width: 48px;
      height: 48px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s;
    }

    #sendBtn:hover { opacity: 0.85; }
    #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }
    #sendBtn svg { width: 20px; height: 20px; fill: white; }

    .hint {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      margin-top: 10px;
    }

    .error-banner {
      background: rgba(220, 80, 80, 0.15);
      border: 1px solid rgba(220, 80, 80, 0.3);
      color: #f08080;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      margin-top: 8px;
    }

    @media (max-width: 480px) {
      header { padding: 20px 16px 12px; }
      .msg { max-width: 95%; }
      .bubble { font-size: 14px; padding: 10px 14px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-eyebrow">Buchreihe</div>
  <h1>Der Raum – <em>zwischen Reiz und Reaktion</em></h1>
  <p>Dein persönlicher Begleiter durch die Bücher</p>
</header>

<div class="chat-wrapper">
  <div id="chat"></div>

  <div class="suggestions" id="suggestions">
    <button class="suggestion-btn" onclick="sendSuggestion(this)">Was ist „der Raum"?</button>
    <button class="suggestion-btn" onclick="sendSuggestion(this)">Wie kann ich bewusster reagieren?</button>
    <button class="suggestion-btn" onclick="sendSuggestion(this)">Was bedeutet: Leiden ist eine Wahl?</button>
    <button class="suggestion-btn" onclick="sendSuggestion(this)">Wie finde ich innere Stille?</button>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="userInput" placeholder="Schreib deine Frage …" rows="1"></textarea>
      <button id="sendBtn" onclick="sendMessage()" aria-label="Senden">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <div class="hint">Basierend auf den Büchern „Du entscheidest", „Schmerz endet" und „Stille"</div>
  </div>
</div>

<script>
  const messages = [];
  const chatEl = document.getElementById("chat");
  const inputEl = document.getElementById("userInput");
  const sendBtn = document.getElementById("sendBtn");

  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + "px";
  });

  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function addMessage(role, text) {
    const wrap = document.createElement("div");
    wrap.className = `msg ${role}`;
    const sender = document.createElement("div");
    sender.className = "sender";
    sender.textContent = role === "user" ? "Du" : "Der Raum";
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;
    wrap.appendChild(sender);
    wrap.appendChild(bubble);
    chatEl.appendChild(wrap);
    chatEl.scrollTop = chatEl.scrollHeight;
    return wrap;
  }

  function addTyping() {
    const wrap = document.createElement("div");
    wrap.className = "msg bot";
    wrap.id = "typing-indicator";
    const sender = document.createElement("div");
    sender.className = "sender";
    sender.textContent = "Der Raum";
    const bubble = document.createElement("div");
    bubble.className = "bubble typing";
    bubble.innerHTML = "<span></span><span></span><span></span>";
    wrap.appendChild(sender);
    wrap.appendChild(bubble);
    chatEl.appendChild(wrap);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById("typing-indicator");
    if (t) t.remove();
  }

  function showError(msg) {
    const el = document.createElement("div");
    el.className = "error-banner";
    el.textContent = msg;
    chatEl.appendChild(el);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function sendSuggestion(btn) {
    inputEl.value = btn.textContent;
    document.getElementById("suggestions").style.display = "none";
    sendMessage();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = "";
    inputEl.style.height = "auto";
    sendBtn.disabled = true;
    document.getElementById("suggestions").style.display = "none";

    addMessage("user", text);
    messages.push({ role: "user", content: text });
    addTyping();

    try {
      // Ruft die Netlify-Funktion auf – kein API-Key im Frontend!
      const response = await fetch("/.netlify/functions/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages })
      });

      const data = await response.json();
      removeTyping();

      if (!response.ok) {
        showError("Fehler: " + (data.error || response.status));
        messages.pop();
      } else {
        const reply = data.reply || "Keine Antwort erhalten.";
        messages.push({ role: "assistant", content: reply });
        addMessage("bot", reply);
      }
    } catch (err) {
      removeTyping();
      showError("Verbindungsfehler: " + err.message);
      messages.pop();
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  window.addEventListener("load", () => {
    setTimeout(() => {
      addMessage("bot", "Willkommen im Raum. 🌿\n\nIch begleite dich durch die Bücher „Du entscheidest", „Schmerz endet, Leiden ist eine Wahl" und „Stille". Was bewegt dich gerade?");
    }, 300);
  });
</script>
</body>
</html>
