<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Der Raum</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-512.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Der Raum" />
  <meta name="theme-color" content="#f5f2ec" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f5f2ec;
      --border: rgba(110,140,110,0.25);
      --accent: #6e8c6e;
      --accent-dark: #4f6b4f;
      --accent-soft: rgba(110,140,110,0.1);
      --text: #2e3028;
      --text-muted: #7a8070;
      --user-bubble: #dde8dd;
      --bot-bubble: #ffffff;
      --radius: 18px;
      --shadow: 0 2px 12px rgba(80,100,80,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Jost', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
    #lockScreen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; padding: 32px; text-align: center; }
    #lockScreen img { width: 110px; height: 110px; border-radius: 22px; margin-bottom: 24px; box-shadow: var(--shadow); }
    #lockScreen h2 { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 26px; margin-bottom: 8px; }
    #lockScreen h2 em { font-style: italic; color: var(--accent-dark); }
    #lockScreen p { font-size: 13px; color: var(--text-muted); margin-bottom: 28px; font-weight: 300; line-height: 1.6; max-width: 280px; }
    #codeInput { width: 100%; max-width: 260px; text-align: center; font-family: 'Jost', sans-serif; font-size: 24px; font-weight: 400; letter-spacing: 8px; padding: 14px 20px; border: 1px solid var(--border); border-radius: 14px; background: white; color: var(--text); outline: none; box-shadow: var(--shadow); transition: border-color 0.2s; }
    #codeInput:focus { border-color: var(--accent); }
    #codeBtn { margin-top: 12px; width: 100%; max-width: 260px; background: var(--accent); color: white; border: none; font-family: 'Jost', sans-serif; font-size: 15px; font-weight: 400; padding: 14px; border-radius: 14px; cursor: pointer; box-shadow: 0 2px 8px rgba(110,140,110,0.3); transition: background 0.2s; }
    #codeBtn:hover { background: var(--accent-dark); }
    #codeError { margin-top: 12px; font-size: 13px; color: #c05050; min-height: 20px; }
    #app { display: none; width: 100%; flex-direction: column; align-items: center; flex: 1; min-height: 100vh; }
    header { width: 100%; max-width: 760px; padding: 28px 20px 16px; text-align: center; border-bottom: 1px solid var(--border); }
    .logo-eyebrow { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
    header h1 { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: clamp(22px, 5vw, 36px); }
    header h1 em { font-style: italic; color: var(--accent-dark); }
    header p { margin-top: 6px; font-size: 13px; color: var(--text-muted); font-weight: 300; }
    .chat-wrapper { width: 100%; max-width: 760px; flex: 1; display: flex; flex-direction: column; padding: 0 16px; }
    #chat { flex: 1; overflow-y: auto; padding: 20px 0 8px; display: flex; flex-direction: column; gap: 16px; min-height: 300px; max-height: calc(100vh - 360px); }
    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .msg { display: flex; flex-direction: column; max-width: 85%; animation: fadeUp 0.3s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.bot { align-self: flex-start; align-items: flex-start; }
    .bubble { padding: 13px 17px; border-radius: var(--radius); font-size: 15px; line-height: 1.7; font-weight: 300; white-space: pre-wrap; box-shadow: var(--shadow); }
    .msg.user .bubble { background: var(--user-bubble); border: 1px solid rgba(110,140,110,0.3); border-bottom-right-radius: 5px; }
    .msg.bot .bubble { background: var(--bot-bubble); border: 1px solid rgba(110,140,110,0.15); border-bottom-left-radius: 5px; }
    .sender { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 5px; padding: 0 4px; }
    .typing span { display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--accent); margin:0 2px; animation:blink 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay:.2s; }
    .typing span:nth-child(3) { animation-delay:.4s; }
    @keyframes blink { 0%,80%,100%{opacity:.25;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }
    .suggestions { padding: 10px 0 12px; display: flex; flex-wrap: wrap; gap: 8px; }
    .suggestion-btn { background: white; border: 1px solid var(--border); color: var(--accent-dark); font-family: 'Jost', sans-serif; font-size: 13px; font-weight: 400; padding: 8px 15px; border-radius: 30px; cursor: pointer; transition: all 0.2s; box-shadow: var(--shadow); }
    .suggestion-btn:hover { background: var(--accent-soft); border-color: var(--accent); }
    .input-area { padding: 12px 0 16px; border-top: 1px solid var(--border); }
    .input-row { display: flex; gap: 10px; align-items: flex-end; }
    #userInput { flex: 1; background: white; border: 1px solid var(--border); border-radius: 14px; color: var(--text); font-family: 'Jost', sans-serif; font-size: 15px; font-weight: 300; padding: 13px 17px; resize: none; min-height: 50px; max-height: 140px; outline: none; transition: border-color 0.2s; line-height: 1.5; box-shadow: var(--shadow); }
    #userInput::placeholder { color: #aab0a0; }
    #userInput:focus { border-color: var(--accent); }
    #sendBtn { background: var(--accent); border: none; border-radius: 14px; width: 50px; height: 50px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.2s; box-shadow: 0 2px 8px rgba(110,140,110,0.3); }
    #sendBtn:hover { background: var(--accent-dark); }
    #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }
    #sendBtn svg { width: 20px; height: 20px; fill: white; }
    .footer-actions { display: flex; justify-content: center; padding: 8px 0 20px; }
    #clearBtn { background: none; border: none; color: var(--text-muted); font-family: 'Jost', sans-serif; font-size: 12px; font-weight: 300; cursor: pointer; padding: 6px 12px; border-radius: 20px; transition: all 0.2s; }
    #clearBtn:hover { color: #c05050; }
    .error-banner { background: #fdf0f0; border: 1px solid #f0c0c0; color: #c05050; border-radius: 12px; padding: 10px 14px; font-size: 13px; margin-top: 8px; }
    @media (max-width: 480px) { header { padding: 20px 16px 12px; } .chat-wrapper { padding: 0 12px; } .msg { max-width: 92%; } .bubble { font-size: 14px; padding: 11px 14px; } }
  </style>
</head>
<body>

<div id="lockScreen">
  <img src="/icon-512.png" alt="Der Raum" />
  <h2>Der Raum &ndash;<br><em>zwischen Reiz und Reaktion</em></h2>
  <p>Bitte gib deinen Zugangscode ein.</p>
  <input type="password" id="codeInput" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;" maxlength="10" inputmode="numeric" />
  <button id="codeBtn">Weiter</button>
  <div id="codeError"></div>
</div>

<div id="app">
  <header>
    <div class="logo-eyebrow">Buchreihe</div>
    <h1>Der Raum &ndash; <em>zwischen Reiz und Reaktion</em></h1>
    <p>Dein pers&ouml;nlicher Begleiter durch die B&uuml;cher</p>
  </header>
  <div class="chat-wrapper">
    <div id="chat"></div>
    <div class="suggestions" id="suggestions">
      <button class="suggestion-btn" onclick="sendSuggestion(this)">Was ist der Raum?</button>
      <button class="suggestion-btn" onclick="sendSuggestion(this)">Wie kann ich bewusster reagieren?</button>
      <button class="suggestion-btn" onclick="sendSuggestion(this)">Leiden ist eine Wahl?</button>
      <button class="suggestion-btn" onclick="sendSuggestion(this)">Wie finde ich innere Stille?</button>
    </div>
    <div class="input-area">
      <div class="input-row">
        <textarea id="userInput" placeholder="Schreib deine Frage ..." rows="1"></textarea>
        <button id="sendBtn" aria-label="Senden">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
    <div class="footer-actions">
      <button id="clearBtn">Gespr&auml;chsverlauf l&ouml;schen</button>
    </div>
  </div>
</div>

<script>
var ACCESS_CODE = "200575";
var STORAGE_KEY = "derRaum_v1";
var AUTH_KEY = "derRaum_auth";
var messages = [];

function checkCode() {
  var input = document.getElementById("codeInput").value.trim();
  if (input === ACCESS_CODE) {
    localStorage.setItem(AUTH_KEY, "1");
    showApp();
  } else {
    document.getElementById("codeError").textContent = "Falscher Code. Bitte versuch es nochmal.";
    document.getElementById("codeInput").value = "";
    document.getElementById("codeInput").focus();
  }
}

document.getElementById("codeBtn").addEventListener("click", checkCode);
document.getElementById("codeInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") checkCode();
});

function showApp() {
  document.getElementById("lockScreen").style.display = "none";
  var app = document.getElementById("app");
  app.style.display = "flex";
  loadHistory();
}

function loadHistory() {
  var saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    try {
      messages = JSON.parse(saved);
      if (messages.length > 0) {
        document.getElementById("suggestions").style.display = "none";
        for (var i = 0; i < messages.length; i++) {
          var role = messages[i].role === "user" ? "user" : "bot";
          renderMessage(role, messages[i].content);
        }
        scrollBottom();
        return;
      }
    } catch(e) { messages = []; }
  }
  setTimeout(function() {
    renderMessage("bot", "Willkommen im Raum.

Ich begleite dich durch die Buecher. Was bewegt dich gerade?");
  }, 300);
}

function saveHistory() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
}

function clearHistory() {
  if (!confirm("Gespraechsverlauf wirklich loeschen?")) return;
  messages = [];
  localStorage.removeItem(STORAGE_KEY);
  document.getElementById("chat").innerHTML = "";
  document.getElementById("suggestions").style.display = "flex";
  setTimeout(function() {
    renderMessage("bot", "Willkommen zurueck im Raum. Was bewegt dich gerade?");
  }, 200);
}

document.getElementById("clearBtn").addEventListener("click", clearHistory);

function renderMessage(role, text) {
  var wrap = document.createElement("div");
  wrap.className = "msg " + role;
  var sender = document.createElement("div");
  sender.className = "sender";
  sender.textContent = role === "user" ? "Du" : "Der Raum";
  var bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = text;
  wrap.appendChild(sender);
  wrap.appendChild(bubble);
  document.getElementById("chat").appendChild(wrap);
  scrollBottom();
}

function addTyping() {
  var wrap = document.createElement("div");
  wrap.className = "msg bot";
  wrap.id = "typing-indicator";
  var sender = document.createElement("div");
  sender.className = "sender";
  sender.textContent = "Der Raum";
  var bubble = document.createElement("div");
  bubble.className = "bubble typing";
  bubble.innerHTML = "<span></span><span></span><span></span>";
  wrap.appendChild(sender);
  wrap.appendChild(bubble);
  document.getElementById("chat").appendChild(wrap);
  scrollBottom();
}

function removeTyping() {
  var t = document.getElementById("typing-indicator");
  if (t) t.remove();
}

function showError(msg) {
  var el = document.createElement("div");
  el.className = "error-banner";
  el.textContent = msg;
  document.getElementById("chat").appendChild(el);
  scrollBottom();
}

function scrollBottom() {
  var chat = document.getElementById("chat");
  chat.scrollTop = chat.scrollHeight;
}

var inputEl = document.getElementById("userInput");
var sendBtn = document.getElementById("sendBtn");

inputEl.addEventListener("input", function() {
  inputEl.style.height = "auto";
  inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + "px";
});

inputEl.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function sendSuggestion(btn) {
  inputEl.value = btn.textContent;
  document.getElementById("suggestions").style.display = "none";
  sendMessage();
}

function sendMessage() {
  var text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = "";
  inputEl.style.height = "auto";
  sendBtn.disabled = true;
  document.getElementById("suggestions").style.display = "none";
  renderMessage("user", text);
  messages.push({ role: "user", content: text });
  saveHistory();
  addTyping();
  fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ messages: messages })
  })
  .then(function(response) {
    return response.json().then(function(data) {
      return { ok: response.ok, data: data };
    });
  })
  .then(function(result) {
    removeTyping();
    if (!result.ok) {
      showError("Fehler: " + (result.data.error || "unbekannt"));
      messages.pop();
    } else {
      var reply = result.data.reply || "Keine Antwort erhalten.";
      messages.push({ role: "assistant", content: reply });
      saveHistory();
      renderMessage("bot", reply);
    }
    sendBtn.disabled = false;
    inputEl.focus();
  })
  .catch(function(err) {
    removeTyping();
    showError("Verbindungsfehler: " + err.message);
    messages.pop();
    sendBtn.disabled = false;
    inputEl.focus();
  });
}

if (localStorage.getItem(AUTH_KEY) === "1") {
  showApp();
}
</script>
</body>
</html>
